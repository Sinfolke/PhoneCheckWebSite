{% extends "base.html" %}

{% block content %}
<div class="bg-light min-vh-100 d-flex align-items-center">
  <div class="container py-5">
    <div class="row justify-content-center">
      <div class="col-md-8 col-lg-5">
        
        <div class="card border-0 shadow-lg rounded-4 overflow-hidden">
          <div class="card-body p-5">
            
            <div class="text-center mb-4">
              <a href="/" class="text-decoration-none">
                <h2 class="fw-bold text-primary mb-1">
                  <i class="bi bi-phone-vibrate"></i> PhoneCheck
                </h2>
              </a>
              <p class="text-muted">Войдите в систему, чтобы продолжить</p>
            </div>

            <form action="/login" method="POST">
              
              <div class="form-floating mb-3">
                <input type="email" class="form-control rounded-3" id="loginEmail" name="email" placeholder="name@example.com" required>
                <label for="loginEmail" class="text-muted">Email адрес</label>
              </div>
              
              <div class="form-floating mb-3">
                <input type="password" class="form-control rounded-3" id="loginPassword" name="password" placeholder="Пароль" required>
                <label for="loginPassword" class="text-muted">Пароль</label>
              </div>

              <div class="d-flex justify-content-between align-items-center mb-4">
                <div class="form-check">
                  <input class="form-check-input" type="checkbox" value="true" id="rememberMe" name="remember">
                  <label class="form-check-label text-muted small" for="rememberMe">
                    Запомнить меня
                  </label>
                </div>
                <a href="/forgot-password" class="text-decoration-none small fw-medium">Забыли пароль?</a>
              </div>

              <button class="btn btn-primary btn-lg w-100 rounded-pill fw-bold shadow-sm" type="submit">
                Войти в аккаунт
              </button>
            </form>

            <div class="text-center mt-4">
              <p class="text-muted small mb-0">Нет аккаунта? 
                <a href="/register" class="text-primary fw-bold text-decoration-none">Зарегистрироваться</a>
              </p>
            </div>

          </div>
        </div>

      </div>
    </div>
  </div>
</div>
{% endblock %}
