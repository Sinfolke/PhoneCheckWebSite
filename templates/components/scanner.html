<div id="universal-scanner" class="scanner-inline">
  <div class="p-3 pb-2 bg-white border-bottom">
    <div>
      <h5 class="scanner-title fw-bold mb-1">
        <i class="bi bi-cpu me-2"></i>
        <span class="scanner-title-text">Сканирование</span>
      </h5>
      <p class="scanner-instruction text-muted small mb-0"></p>
    </div>
  </div>

  <div class="p-2 bg-light">
    <div class="scanner-shell position-relative mx-auto">
      <div class="scanner-wrapper position-relative rounded-4 overflow-hidden shadow-sm bg-dark">
        <video class="camera-feed" autoplay playsinline muted></video>
        <canvas class="scanner-overlay"></canvas>

        <div class="scan-frame">
          <div class="scan-line"></div>
        </div>
      </div>

      <div class="mt-3">
        <div class="scanner-status alert alert-secondary py-2 px-3 fw-medium mb-2 rounded-4 border-0 shadow-sm">
          <div class="camera-status bi bi-camera-video me-1"></div>
        </div>
        <div class="scanner-server-hint small fw-semibold text-primary text-center" style="min-height: 20px;"></div>
      </div>
    </div>
  </div>

  <div class="p-3 pb-2 bg-white border-top">
    <div class="border rounded-4 p-3 bg-light-subtle">
      <div class="fw-bold small mb-1">
        <i class="bi bi-upc-scan me-1"></i> Что ищем
      </div>
      <div class="scanner-what-to-scan text-muted small"></div>
    </div>
  </div>

  <div class="px-3 pb-3 bg-white">
    <div class="scanner-success card mt-2 border-success border-2 d-none rounded-4 shadow-sm">
      <div class="card-body bg-success bg-opacity-10 text-start p-3 rounded-4">
        <div class="d-flex align-items-start gap-2 mb-2">
          <i class="bi bi-check-circle-fill text-success fs-5"></i>
          <div>
            <h6 class="fw-bold text-success mb-1">Данные сохранены</h6>
            <div class="scanner-success-description text-muted small"></div>
          </div>
        </div>

        <div class="scanner-success-data mb-3 text-dark fw-medium rounded-3 p-3 bg-white border"
             style="font-size: 0.92rem; min-height: 48px;"></div>
      </div>
    </div>
  </div>
</div>
